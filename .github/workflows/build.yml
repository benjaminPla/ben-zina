name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build-app:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ben-zina_app:latest

  build-web:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/web
          file: ./infra/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ben-zina_web:latest

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: [build-app, build-web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: infra/docker-compose.prod.yml,infra/ben-zina.service,infra/ben-zina-nginx-reload.service,infra/ben-zina-nginx-reload.timer
          target: /opt/ben-zina/
          mkdir: true

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cat > /opt/ben-zina/infra/.env <<'EOF'
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF
            cp /opt/ben-zina/infra/ben-zina.service /etc/systemd/system/ben-zina.service
            cp /opt/ben-zina/infra/ben-zina-nginx-reload.service /etc/systemd/system/ben-zina-nginx-reload.service
            cp /opt/ben-zina/infra/ben-zina-nginx-reload.timer /etc/systemd/system/ben-zina-nginx-reload.timer
            systemctl daemon-reload
            systemctl enable ben-zina
            systemctl enable ben-zina-nginx-reload.timer
            docker compose -f /opt/ben-zina/infra/docker-compose.prod.yml pull
            systemctl restart ben-zina
            systemctl enable --now ben-zina-nginx-reload.timer
            docker image prune -f
